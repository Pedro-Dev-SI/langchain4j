services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: langchain4j-postgres
    environment:
      POSTGRES_DB: langchain4j
      POSTGRES_USER: langchain4j
      POSTGRES_PASSWORD: langchain4j
    ports:
      - "5433:5432"
    volumes:
      - langchain4j-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langchain4j -d langchain4j"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  langchain4j-postgres-data:
